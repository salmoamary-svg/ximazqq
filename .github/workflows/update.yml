name: Update Saad Money
on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch: {}
permissions:
  contents: write
concurrency: saad-money-update
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Sync from Gmail and update app
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python update_app.py
